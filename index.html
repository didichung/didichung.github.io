<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Artist Website</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .neon-glow:hover {
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-[#0D0D11] text-gray-100 min-h-screen flex flex-col justify-between">

    <!-- HERO SECTION -->
    <header class="relative overflow-hidden pt-20 pb-12 text-center px-4">
        <!-- Efek Cahaya Volumetrik di Background -->
        <div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-purple-900/20 blur-[120px] rounded-full pointer-events-none"></div>
        <div class="absolute top-[10%] left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-cyan-900/20 blur-[100px] rounded-full pointer-events-none"></div>

        <!-- Avatar / Logo Brand -->
        <div class="relative w-32 h-32 mx-auto mb-6 rounded-full overflow-hidden border-2 border-[#00F2FE]/50 shadow-lg">
            <img src="didi1.jpeg" alt="Artist Profile" class="w-full h-full object-cover">
        </div>

        <!-- Nama & Subtitle -->
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-[#00F2FE]">
            DIDI CHUNG
        </h1>
        <p class="text-sm md:text-base text-gray-400 mt-3 tracking-widest uppercase max-w-md mx-auto">
            Digital Artist & Independent Musician
        </p>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-4xl w-full mx-auto px-4 flex-grow space-y-16">

        <!-- SPOTIFY EMBED (FEATURED TRACK) -->
        <section class="bg-[#161224]/60 border border-gray-800/80 p-6 rounded-2xl backdrop-blur-md shadow-2xl">
            <h2 class="text-xs uppercase tracking-widest text-[#00F2FE] font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#1ED760] animate-pulse"></span> Latest Release
            </h2>
            <!-- Ganti URL src dengan link embed Spotify track/album-mu -->
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/album/5zp7fzGQMFrPPLRP06qtVy?utm_source=generator&si=8525d0d5e9844a0c" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </section>

        <!-- DISKOGRAFI RELEASES GRID -->
        <section>
            <h2 class="text-xl font-bold tracking-tight text-white mb-6 border-b border-gray-800 pb-2">
                Discography
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <!-- Card Rilisan 1 -->
                <div class="group relative bg-[#121216] rounded-xl overflow-hidden border border-gray-900 hover:border-gray-800 transition">
                    <div class="aspect-square w-full overflow-hidden bg-gray-800 relative">
                        <img src="ltb.png" alt="Cover Art" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <span class="text-xs font-bold text-[#00F2FE] tracking-wider uppercase">Dengarkan</span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-200 truncate">Light the Beginning</h3>
                        <p class="text-xs text-gray-500 mt-0.5">EP • 2026</p>
                    </div>
                </div>

                <!-- Card Rilisan 2 -->
                <div class="group relative bg-[#121216] rounded-xl overflow-hidden border border-gray-900 hover:border-gray-800 transition">
                    <div class="aspect-square w-full overflow-hidden bg-gray-800 relative">
                        <img src="ds.png" alt="Cover Art" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <span class="text-xs font-bold text-[#00F2FE] tracking-wider uppercase">Dengarkan</span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-200 truncate">Dark Silhouette</h3>
                        <p class="text-xs text-gray-500 mt-0.5">EP • 2026</p>
                    </div>
                </div>

                <!-- Card Rilisan 3 -->
                <div class="group relative bg-[#121216] rounded-xl overflow-hidden border border-gray-900 hover:border-gray-800 transition">
                    <div class="aspect-square w-full overflow-hidden bg-gray-800 relative">
                        <img src="eh.png" alt="Cover Art" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <span class="text-xs font-bold text-[#00F2FE] tracking-wider uppercase">Dengarkan</span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-200 truncate">Eternal Harmony</h3>
                        <p class="text-xs text-gray-500 mt-0.5">EP • 2026</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- QUICK LINKS / HUB -->
        <section class="text-center pb-12">
            <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-4">Connect Worldwide</h2>
            <div class="flex flex-wrap justify-center gap-4">
                <!-- Linktree Redirect Button -->
                <a href="#" class="neon-glow bg-transparent border border-[#00F2FE] text-[#00F2FE] px-6 py-2.5 rounded-full text-sm font-semibold tracking-wide transition uppercase">
                    Music & Smartlinks
                </a>
                <!-- Contact Email -->
                <a href="mailto:your@email.com" class="bg-gray-950 hover:bg-gray-900 text-gray-300 border border-gray-800 px-6 py-2.5 rounded-full text-sm font-semibold tracking-wide transition">
                    Business Inquiries
                </a>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="w-full border-t border-gray-900 py-6 text-center text-xs text-gray-600">
        <p>&copy; 2026 Didi Chung. All Rights Reserved.</p>
    </footer>

</body>
</html>
